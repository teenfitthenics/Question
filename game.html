<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Mini Game ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(180deg,#fff5f7,#ffe5ec);
  overflow:hidden;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.bg-hearts{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:-1;
}

.floating-heart{
  position:absolute;
  bottom:-50px;
  color:rgba(255,0,85,0.18);
  animation:float linear infinite;
}

@keyframes float{
  from{
    transform:translateY(0) rotate(0deg);
  }
  to{
    transform:translateY(-120vh) rotate(360deg);
  }
}

.box{
  width:100%;
  max-width:430px;
  background:rgba(255,255,255,0.82);
  backdrop-filter:blur(14px);
  padding:30px;
  border-radius:34px;
  text-align:center;
  box-shadow:0 12px 40px rgba(255,0,85,0.12);
}

.title{
  font-family:'Dancing Script',cursive;
  color:#d90429;
  font-size:3rem;
  margin-bottom:10px;
}

.text{
  color:#5b1c1c;
  line-height:1.8;
  margin-bottom:25px;
}

.game-area{
  position:relative;
  height:300px;
  background:#fff0f3;
  border-radius:28px;
  overflow:hidden;
}

#heart{
  position:absolute;
  font-size:2.5rem;
  cursor:pointer;
  transition:0.15s;
  user-select:none;
}

.score-box{
  margin-top:20px;
  font-size:1.2rem;
  color:#c1121f;
  font-weight:700;
}

.back{
  display:block;
  margin-top:24px;
  text-decoration:none;
  background:#d90429;
  color:white;
  padding:15px;
  border-radius:18px;
  font-weight:600;
  transition:0.3s;
}

.back:hover{
  background:#ef233c;
}

.cute{
  margin-top:18px;
  font-size:1.6rem;
}

</style>
</head>
<body>

<div class="bg-hearts" id="bg"></div>

<div class="box">

  <h1 class="title">Catch My Love ❤️</h1>

  <p class="text">
    Catch the moving heart and increase our love score 💖
  </p>

  <div class="game-area" id="gameArea">

    <div id="heart">❤️</div>

  </div>

  <div class="score-box">
    Love Score:
    <span id="score">0</span>
  </div>

  <div class="cute">
    🌹 💖 ✨ 🦋
  </div>

  <a href="index.html" class="back">
    Back To Home ❤️
  </a>

</div>

<script>

const heart = document.getElementById("heart");
const gameArea = document.getElementById("gameArea");
const scoreText = document.getElementById("score");

let score = 0;

function moveHeart(){

  const areaWidth = gameArea.clientWidth - 60;
  const areaHeight = gameArea.clientHeight - 60;

  const randomX = Math.random() * areaWidth;
  const randomY = Math.random() * areaHeight;

  heart.style.left = randomX + "px";
  heart.style.top = randomY + "px";
}

heart.addEventListener("click", () => {

  score++;

  scoreText.innerText = score;

  moveHeart();

  heart.style.transform = "scale(1.3)";

  setTimeout(() => {
    heart.style.transform = "scale(1)";
  },150);

});

setInterval(moveHeart,1200);

moveHeart();


// BACKGROUND FLOATING HEARTS

const bg = document.getElementById("bg");

for(let i=0;i<25;i++){

  const h = document.createElement("div");

  h.classList.add("floating-heart");

  h.innerHTML = "❤️";

  h.style.left = Math.random()*100 + "vw";

  h.style.fontSize = (Math.random()*20 + 14) + "px";

  h.style.animationDuration = (Math.random()*10 + 8) + "s";

  h.style.opacity = Math.random();

  bg.appendChild(h);
}

</script>

</body>
</html>
