<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Time ⏳</title>

<style>

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#fff5f7;
  font-family:Poppins,sans-serif;
  padding:20px;
}

.box{
  max-width:420px;
  width:100%;
  background:white;
  padding:30px;
  border-radius:30px;
  box-shadow:0 10px 40px rgba(255,0,80,0.12);
  text-align:center;
}

h1{
  color:#d90429;
}

.timer{
  margin-top:20px;
  font-size:1.3rem;
  color:#c1121f;
  line-height:2;
  font-weight:bold;
}

a{
  display:block;
  margin-top:25px;
  background:#d90429;
  color:white;
  text-decoration:none;
  padding:14px;
  border-radius:16px;
}

</style>
</head>
<body>

<div class="box">

<h1>Our Journey ❤️</h1>

<div class="timer" id="timer"></div>

<a href="index.html">Back</a>

</div>

<script>

function updateTimer(){

  const start = new Date("2024-03-25T00:00:00");

  const now = new Date();

  const diff = now - start;

  const seconds = Math.floor(diff/1000);

  const years = Math.floor(seconds/(365*24*60*60));

  const days = Math.floor((seconds%(365*24*60*60))/(24*60*60));

  const hours = Math.floor((seconds%(24*60*60))/(60*60));

  const minutes = Math.floor((seconds%(60*60))/60);

  const secs = Math.floor(seconds%60);

  document.getElementById("timer").innerHTML = `
    ${years} Years <br>
    ${days} Days <br>
    ${hours} Hours <br>
    ${minutes} Minutes <br>
    ${secs} Seconds
  `;
}

setInterval(updateTimer,1000);

updateTimer();

</script>

</body>
</html>
