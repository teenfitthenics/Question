<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Love Time ⏳</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(180deg,#fff5f7,#ffe5ec);
  font-family:'Poppins',sans-serif;
  padding:20px;
}

.box{
  width:100%;
  max-width:430px;
  background:rgba(255,255,255,0.82);
  backdrop-filter:blur(12px);
  padding:32px;
  border-radius:30px;
  text-align:center;
  box-shadow:0 10px 40px rgba(255,0,85,0.12);
}

h1{
  color:#d90429;
  margin-bottom:18px;
}

.text{
  color:#5b1c1c;
  line-height:1.9;
  margin-bottom:25px;
}

.timer{
  font-size:1.3rem;
  color:#c1121f;
  line-height:2;
  font-weight:700;
}

a{
  display:block;
  margin-top:28px;
  background:#d90429;
  color:white;
  text-decoration:none;
  padding:15px;
  border-radius:18px;
  font-weight:600;
}

.heart{
  margin-top:18px;
  font-size:1.8rem;
}

</style>
</head>
<body>

<div class="box">

<h1>Our Journey Together ❤️</h1>

<p class="text">
Every second with you has become
one of the most beautiful memories of my life.
</p>

<div class="timer" id="timer"></div>

<div class="heart">
❤️ ⏳ ❤️
</div>

<a href="index.html">Back To Home ❤️</a>

</div>

<script>

function updateTimer(){

  const start = new Date("2024-03-25T00:00:00");

  const now = new Date();

  const diff = now - start;

  const seconds = Math.floor(diff/1000);

  const years = Math.floor(seconds/(365*24*60*60));

  const days = Math.floor((seconds%(365*24*60*60))/(24*60*60));

  const hours = Math.floor((seconds%(24*60*60))/(60*60));

  const minutes = Math.floor((seconds%(60*60))/60);

  const secs = Math.floor(seconds%60);

  document.getElementById("timer").innerHTML = `
    ${years} Years <br>
    ${days} Days <br>
    ${hours} Hours <br>
    ${minutes} Minutes <br>
    ${secs} Seconds
  `;
}

setInterval(updateTimer,1000);

updateTimer();

</script>

</body>
</html>
